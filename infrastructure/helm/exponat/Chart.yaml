apiVersion: v2
name: exponat
description: Helm chart for Exponat SaaS platform
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  # OCI на Docker Hub — работает там, где HTTPS charts.bitnami.com отдаёт 403 (гео/Cloudflare).
  - name: postgresql
    version: "14.3.3"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: "18.19.4"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled

