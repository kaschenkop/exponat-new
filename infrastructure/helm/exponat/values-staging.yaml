# Staging: по одной реплике на сервис, чтобы снизить стоимость кластера.
services:
  apiGateway:
    enabled: false
    replicas: 1
  projects:
    replicas: 1
  budget:
    replicas: 1
  dashboard:
    replicas: 1
  aiDocumentGen:
    replicas: 1

ingress:
  hosts:
    - host: api.staging.exponat.site
      paths:
        - path: /
          pathType: Prefix

# Расчёт на кластер с достаточной ёмкостью (см. docs/deployment/staging-gcp.md § «Масштаб ноды»).
# Для одной e2-medium без второй ноды используйте values-staging-lowfootprint.yaml.
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "1000m"
