# Staging: по одной реплике на сервис, чтобы снизить стоимость кластера.
# Фронт (Next.js) в GKE: Ingress → сервис web; API через Kong LoadBalancer (см. docs/deployment/staging-gcp-k8s-db.md).
services:
  apiGateway:
    enabled: false
    replicas: 1
  projects:
    replicas: 1
  budget:
    replicas: 1
  dashboard:
    replicas: 1
  aiDocumentGen:
    replicas: 1
  web:
    enabled: true
    port: 3000
    healthPath: /health
    replicas: 1
    # Next standalone слушает по HOSTNAME; kubelet подставляет HOSTNAME=имя пода → 404 на /health без 0.0.0.0.
    # command гарантирует bind даже если env из манифеста перебита.
    command: ["/bin/sh", "-c"]
    args:
      - exec env HOSTNAME=0.0.0.0 node server.js
    env:
      - name: HOSTNAME
        value: "0.0.0.0"
    # Целиком задаём пробы (только httpGet): после ручного kubectl patch с tcpSocket
    # стратегический merge Helm оставлял два handler — replace в CI и явный блок здесь это снимают.
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 20
      periodSeconds: 10
    resources:
      requests:
        memory: 256Mi
        cpu: 70m
      limits:
        memory: 768Mi
        cpu: 1000m
    envFrom:
      - secretRef:
          name: exponat-web-env

ingress:
  enabled: true
  className: nginx
  rules:
    - host: app.staging.exponat.site
      paths:
        - path: /
          pathType: Prefix
          service: web
          port: 80

# Низкие CPU requests для планирования на 2–4× e2-medium вместе с Kong + Bitnami.
# Ещё ниже — values-staging-lowfootprint.yaml (не подмешан в CI по умолчанию).
resources:
  requests:
    memory: "192Mi"
    cpu: "70m"
  limits:
    memory: "512Mi"
    cpu: "1000m"
