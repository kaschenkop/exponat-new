{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $dns := include "exponat.k8sServiceName" $name }}
{{- $pullSecrets := (default dict $.Values.global).imagePullSecrets | default list }}
{{- $imgPrefix := $.Values.image.repositoryPrefix | default "exponat" }}
{{- $healthPath := $svc.healthPath | default "/health" }}
{{- $res := $svc.resources | default $.Values.resources }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $dns }}
  labels:
    app: {{ $dns }}
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $dns }}
  template:
    metadata:
      labels:
        app: {{ $dns }}
    spec:
      {{- if gt (len $pullSecrets) 0 }}
      imagePullSecrets:
        {{- toYaml $pullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $dns }}
          image: "{{ $.Values.image.registry }}/{{ $imgPrefix }}/{{ $dns }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          {{- with $svc.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ $healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $svc.livenessInitialDelaySeconds | default 15 }}
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ $healthPath }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $svc.readinessInitialDelaySeconds | default 5 }}
            periodSeconds: 10
          resources:
            {{- toYaml $res | nindent 12 }}
{{- end }}
{{- end }}
