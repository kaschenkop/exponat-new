{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $dns := include "exponat.k8sServiceName" $name }}
{{- $pullSecrets := (default dict $.Values.global).imagePullSecrets | default list }}
{{- $imgPrefix := $.Values.image.repositoryPrefix | default "exponat" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $dns }}
  labels:
    app: {{ $dns }}
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $dns }}
  template:
    metadata:
      labels:
        app: {{ $dns }}
    spec:
      {{- if gt (len $pullSecrets) 0 }}
      imagePullSecrets:
        {{- toYaml $pullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $dns }}
          image: "{{ $.Values.image.registry }}/{{ $imgPrefix }}/{{ $dns }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
{{- end }}
{{- end }}
