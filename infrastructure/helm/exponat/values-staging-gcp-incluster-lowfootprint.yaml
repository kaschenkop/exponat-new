# Урезанные CPU/memory requests для Postgres и Redis на малом кластере (~940m allocatable CPU на ноду).
# Всегда в паре с values-staging-gcp-incluster.yaml (секреты) и values-staging-lowfootprint.yaml (сервисы).
#
# Из корня репозитория:
#   helm upgrade --install exponat ./infrastructure/helm/exponat \
#     -f ./infrastructure/helm/exponat/values-staging-lowfootprint.yaml \
#     -f ./infrastructure/helm/exponat/values-staging-gcp-incluster.yaml \
#     -f ./infrastructure/helm/exponat/values-staging-gcp-incluster-lowfootprint.yaml \
#     -n staging --atomic --timeout 20m

postgresql:
  primary:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1000m

redis:
  master:
    resources:
      requests:
        memory: 128Mi
        cpu: 25m
      limits:
        memory: 512Mi
        cpu: 500m
