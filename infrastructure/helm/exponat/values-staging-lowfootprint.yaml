# Урезанные requests для микросервисов (80m CPU / 192Mi RAM) — 1–2× e2-medium.
# Вместе с values-staging-gcp-incluster.yaml + values-staging-gcp-incluster-lowfootprint.yaml.
# Полный staging без урезания: values-staging.yaml + values-staging-gcp-incluster.yaml.

services:
  apiGateway:
    enabled: false
    replicas: 1
  projects:
    replicas: 1
  budget:
    replicas: 1
  dashboard:
    replicas: 1
  aiDocumentGen:
    replicas: 1
  web:
    replicas: 1

resources:
  requests:
    memory: "192Mi"
    cpu: "80m"
  limits:
    memory: "512Mi"
    cpu: "1000m"
