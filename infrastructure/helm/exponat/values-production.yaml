services:
  apiGateway:
    enabled: false
    replicas: 3
  projects:
    replicas: 3
  budget:
    replicas: 2
  logistics:
    replicas: 2
  dashboard:
    replicas: 2
  aiDocumentGen:
    replicas: 2

ingress:
  enabled: false
  className: nginx
  annotations: {}
  rules: []

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "2000m"
