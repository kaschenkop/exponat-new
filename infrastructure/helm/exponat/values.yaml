replicaCount: 1

# GHCR: образы вида <registry>/<repositoryPrefix>/<сервис> (по умолчанию ghcr.io/exponat/...).
# Форк/другой owner: repositoryPrefix = GitHub owner (в CI задаётся --set из github.repository_owner).
global:
  imagePullSecrets: []

image:
  registry: ghcr.io
  repositoryPrefix: exponat
  tag: latest
  pullPolicy: IfNotPresent

services:
  apiGateway:
    enabled: false
    port: 8080
    replicas: 2
  projects:
    enabled: true
    port: 8081
    replicas: 1
  budget:
    enabled: true
    port: 8082
    replicas: 1
  dashboard:
    enabled: true
    port: 8080
    replicas: 1
  aiDocumentGen:
    enabled: true
    port: 8090
    replicas: 1
  web:
    enabled: false
    port: 3000
    healthPath: /health
    replicas: 1

postgresql:
  enabled: true
  auth:
    database: exponat
    username: exponat

redis:
  enabled: true
  architecture: standalone

ingress:
  enabled: false
  className: nginx
  annotations: {}
  # TLS: список { hosts: [], secretName } — см. values-staging.yaml + cert-manager.
  tls: []
  rules: []

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"
