# Staging: мало ресурсов, одна реплика (малый кластер / экономия).
# CPU request минимальный для планирования рядом с exponat + Postgres/Redis.

replicaCount: 1

env:
  nginx_worker_processes: "2"
  nginx_worker_connections: "4096"
  # GKE (COS): в поде нет IPv6 loopback — дефолт Kong [::1]:8444 даёт
  # nginx: bind() to [::1]:8444 failed (99: Cannot assign requested address)
  admin_listen: "127.0.0.1:8444 http2 ssl"

resources:
  requests:
    cpu: 50m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi
