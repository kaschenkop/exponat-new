# Staging: мало ресурсов, одна реплика (малый кластер / экономия).
# CPU request минимальный для планирования рядом с exponat + Postgres/Redis.

replicaCount: 1

# Чарт Kong при admin.enabled=false сам подставляет addresses 127.0.0.1 + [::1] для TLS Admin.
# На GKE/COS [::1]:8444 часто не биндится — задаём только IPv4 (см. kong/charts _helpers.tpl).
admin:
  addresses:
    - 127.0.0.1

env:
  nginx_worker_processes: "2"
  nginx_worker_connections: "4096"

resources:
  requests:
    cpu: 50m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi
