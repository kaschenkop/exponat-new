# Staging: мало ресурсов, одна реплика (малый кластер / экономия).
# CPU request держим низким: на 2× e2-medium с системными подами + exponat часто
# FailedScheduling Insufficient cpu при 150m+ (см. kubectl get events -n kong).

replicaCount: 1

env:
  nginx_worker_processes: "2"
  nginx_worker_connections: "4096"

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
