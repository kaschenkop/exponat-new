# Запуск Kong рядом с основным стеком: сначала `docker compose up -d` в корне репозитория
# (нужен сервис redis и приложения projects/dashboard).
# Сеть по умолчанию Compose: exponat_default.
services:
  kong:
    image: kong:3.5
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    networks:
      - exponat-network
    restart: unless-stopped

networks:
  exponat-network:
    external: true
    name: exponat_default
