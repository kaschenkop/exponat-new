# -----------------------------------------------------------------------------
# Consumers (JWT). Секрет замените через CI/секреты, не коммитьте прод-значения.
# -----------------------------------------------------------------------------
consumers:
  - username: exponat-anonymous
    custom_id: anonymous

  - username: exponat-frontend
    custom_id: frontend-app
    jwt_secrets:
      - key: exponat-jwt-key
        algorithm: HS256
        secret: dev-change-in-production-use-secret-manager
