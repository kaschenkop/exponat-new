_format_version: "3.0"
_transform: true

# Для Kubernetes замените хосты вида service:port на
# service.namespace.svc.cluster.local:port (см. infrastructure/kong/README.md).
#
# Rate limiting: policy: local — для одного инстанса Kong (docker compose). В кластере с
# несколькими репликами Kong замените на policy: redis и redis_* (см. README).
#
# JWT (Keycloak): access tokens — RS256; JWKS у realm: .../realms/<realm>/protocol/openid-connect/certs.
# В Kong OSS проверка Keycloak JWT обычно делегируется upstream (Go/Python) или отдельным плагином;
# не подставляйте сюда плагин jwt с фиксированным secret вместо JWKS.

# -----------------------------------------------------------------------------
# Global plugins
# -----------------------------------------------------------------------------
plugins:
  - name: cors
    config:
      origins:
        # Продакшен: exponat.site (DNS)
        - https://exponat.site
        - https://staging.exponat.site
        # Фронт в GKE (Ingress), API через Kong
        - https://app.staging.exponat.site
        - http://localhost:3000
        - http://127.0.0.1:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-Organization-Id
        - X-User-Id
      exposed_headers:
        - X-Auth-Token
        - X-Request-ID
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: prometheus
    config:
      per_consumer: true

  - name: file-log
    config:
      path: /dev/stdout
      reopen: true

  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

# -----------------------------------------------------------------------------
# Upstreams (health checks; цели — Docker Compose по умолчанию)
# -----------------------------------------------------------------------------
upstreams:
  - name: projects-upstream
    algorithm: round-robin
    hash_on: none
    healthchecks:
      active:
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
        http_path: /health
        timeout: 1
      passive:
        healthy:
          successes: 2
        unhealthy:
          http_failures: 3
    targets:
      - target: projects:8081
        weight: 100

  - name: dashboard-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        timeout: 1
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
    targets:
      - target: dashboard:8080
        weight: 100

  - name: budget-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
    targets:
      - target: budget:8082
        weight: 100

# -----------------------------------------------------------------------------
# Services & routes
# -----------------------------------------------------------------------------
services:
  - name: projects-service
    host: projects-upstream
    port: 80
    protocol: http
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    routes:
      - name: projects-api
        paths:
          - /api/projects
        strip_path: false
    plugins:
      # JWT не вешаем: браузер шлёт Keycloak access_token (RS256); Kong OSS jwt — HS256 по consumer.
      # Проверка — на сервисах (projects/dashboard) через JWKS.
      - name: rate-limiting
        config:
          second: 10
          minute: 100
          hour: 5000
          day: 50000
          policy: local
      - name: request-size-limiting
        config:
          allowed_payload_size: 10

  - name: dashboard-service
    host: dashboard-upstream
    port: 80
    protocol: http
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 2
    routes:
      - name: dashboard-api
        paths:
          - /api/dashboard
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 5000
          policy: local
      - name: request-size-limiting
        config:
          allowed_payload_size: 5

  - name: budget-service
    host: budget-upstream
    port: 80
    protocol: http
    routes:
      - name: budgets-api
        paths:
          - /api/v1/budgets
        strip_path: false
    plugins:
