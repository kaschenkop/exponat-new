name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web
          scope: ${{ secrets.VERCEL_ORG_ID }}

  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set K8s context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Add Kong Helm repo
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Deploy Kong Gateway
        run: |
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap kong-dbless-config \
            --from-file=kong.yml=./infrastructure/kong/kong.yml \
            -n kong --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install kong kong/kong \
            -f ./infrastructure/kong/kong-values.yaml \
            -n kong \
            --wait --timeout 10m

      - name: Deploy with Helm
        run: |
          helm upgrade --install exponat ./infrastructure/helm/exponat \
            -f ./infrastructure/helm/exponat/values-staging.yaml \
            --namespace staging \
            --create-namespace \
            --wait

  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployed to Staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployed to Staging\nBranch: `develop`\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
