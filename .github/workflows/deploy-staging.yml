# Staging с ветки develop: образы в GHCR (reusable) + GKE: Kong + Helm exponat (включая Next.js web + Ingress).
# Vercel не используется. Фронт: Ingress на app.staging.exponat.site → сервис web.
#
# Секреты (environment «staging» или repository): KUBE_CONFIG_STAGING — полный kubeconfig
# (`kubectl config view --raw --minify --flatten`). Без него шаг Set K8s context падает с «kubeconfig not supplied».

name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-images:
    name: Publish images to GHCR (backend + web)
    uses: ./.github/workflows/publish-backend-ghcr.yml
    secrets: inherit

  deploy-staging:
    name: Deploy to GKE (Kong + Helm)
    runs-on: ubuntu-latest
    environment: staging
    needs: [publish-images]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Check KUBE_CONFIG_STAGING
        env:
          KCFG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "$KCFG" ]; then
            echo "::error::KUBE_CONFIG_STAGING пустой или не задан. Добавьте секрет: GitHub → Settings → Environments → staging → Environment secrets (или Repository secrets). Значение: вывод kubectl config view --raw --minify --flatten"
            exit 1
          fi

      - name: Set K8s context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Add Kong Helm repo
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Deploy Kong Gateway
        run: |
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap kong-dbless-config \
            --from-file=kong.yml=./infrastructure/kong/kong.yml \
            -n kong --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install kong kong/kong \
            -f ./infrastructure/kong/kong-values-common.yaml \
            -f ./infrastructure/kong/kong-values-staging.yaml \
            -n kong \
            --wait --timeout 10m

      - name: Helm dependencies (exponat / Bitnami OCI)
        run: helm dependency update ./infrastructure/helm/exponat

      - name: Deploy exponat (GCP staging + web Ingress)
        run: |
          helm upgrade --install exponat ./infrastructure/helm/exponat \
            -f ./infrastructure/helm/exponat/values-staging.yaml \
            -f ./infrastructure/helm/exponat/values-staging-gcp-incluster.yaml \
            -f ./infrastructure/helm/exponat/values-staging-gcp-incluster-lowfootprint.yaml \
            --set image.repositoryPrefix=${{ github.repository_owner }} \
            --namespace staging \
            --create-namespace \
            --atomic \
            --timeout 20m \
            --wait

  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployed to Staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployed to Staging (GKE)\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
