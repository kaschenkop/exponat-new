# Деплой staging с ветки develop: Vercel (web) + GKE (Kong + Helm exponat).
# Образы backend публикуются в GHCR перед helm upgrade, чтобы тег latest совпадал с коммитом.

name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-backend:
    name: Publish backend images to GHCR
    uses: ./.github/workflows/publish-backend-ghcr.yml
    secrets: inherit

  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web
          scope: ${{ secrets.VERCEL_ORG_ID }}

  deploy-backend:
    name: Deploy Backend to Staging (GKE)
    runs-on: ubuntu-latest
    environment: staging
    needs: [publish-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set K8s context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Add Kong Helm repo
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo update

      - name: Deploy Kong Gateway
        run: |
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap kong-dbless-config \
            --from-file=kong.yml=./infrastructure/kong/kong.yml \
            -n kong --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install kong kong/kong \
            -f ./infrastructure/kong/kong-values-common.yaml \
            -f ./infrastructure/kong/kong-values-staging.yaml \
            -n kong \
            --wait --timeout 10m

      - name: Helm dependencies (exponat / Bitnami OCI)
        run: helm dependency update ./infrastructure/helm/exponat

      - name: Deploy exponat (GCP staging values)
        run: |
          helm upgrade --install exponat ./infrastructure/helm/exponat \
            -f ./infrastructure/helm/exponat/values-staging.yaml \
            -f ./infrastructure/helm/exponat/values-staging-gcp-incluster.yaml \
            -f ./infrastructure/helm/exponat/values-staging-gcp-incluster-lowfootprint.yaml \
            --set image.repositoryPrefix=${{ github.repository_owner }} \
            --namespace staging \
            --create-namespace \
            --atomic \
            --timeout 20m \
            --wait

  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployed to Staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployed to Staging\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
