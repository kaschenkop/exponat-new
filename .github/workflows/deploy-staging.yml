# Staging с ветки develop: образы в GHCR (reusable) + GKE: Kong + Helm exponat (включая Next.js web + Ingress).
#
# Доступ к кластеру (выберите один вариант):
# — Рекомендуется для GKE: repository variable KUBERNETES_AUTH не задавать или ≠ kubeconfig;
#   секрет GCP_SA_KEY (JSON сервисного аккаунта с roles/container.developer);
#   variables: GCP_PROJECT_ID, GKE_CLUSTER_NAME, GKE_LOCATION — как в gcloud container clusters list
#   (zonal: europe-west3-a; regional: europe-west3). Только регион при zonal-кластере → not found.
# — kubeconfig: KUBERNETES_AUTH=kubeconfig и секрет KUBE_CONFIG_STAGING — только с Linux/macOS
#   (kubectl config view --raw --minify --flatten). Конфиг с Windows (.exe в exec) в CI не работает.
# Инструкция (Windows + GCP SA): docs/deployment/github-actions-gke-windows.md
# Private GKE / DNS endpoint: variable GKE_USE_DNS_BASED_ENDPOINT=true (см. тот же документ).
# Keycloak staging: секрет KEYCLOAK_STAGING_ADMIN_PASSWORD в environment «staging»;
# см. docs/deployment/staging-gcp-k8s-db.md § Keycloak в staging.

name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      skip_publish_images:
        description: Не собирать образы в GHCR (если менялись только Kong / values)
        required: false
        type: boolean
        default: false
      kong_only:
        description: Только Kong (namespace, configmap, helm kong) — без чарта exponat
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

# Новый прогон отменяет предыдущий — иначе два helm upgrade подряд дают
# "another operation (install/upgrade/rollback) is in progress".
concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Образы в GHCR только для сервисов с изменениями в коммите (staging Helm: tag latest).
  staging-changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_publish_images }}
    outputs:
      projects: ${{ steps.resolve.outputs.projects }}
      dashboard: ${{ steps.resolve.outputs.dashboard }}
      budget: ${{ steps.resolve.outputs.budget }}
      ai_document_gen: ${{ steps.resolve.outputs.ai_document_gen }}
      web: ${{ steps.resolve.outputs.web }}
      any_service: ${{ steps.resolve.outputs.any_service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Какие образы пересобрать
        id: resolve
        run: |
          set -e
          SHA="${{ github.sha }}"
          all_true() {
            echo "projects=true" >> "$GITHUB_OUTPUT"
            echo "dashboard=true" >> "$GITHUB_OUTPUT"
            echo "budget=true" >> "$GITHUB_OUTPUT"
            echo "ai_document_gen=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "any_service=true" >> "$GITHUB_OUTPUT"
          }
          B="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "push" ] && [ -n "$B" ] && [ "$B" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$B"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            BASE_SHA=$(git rev-parse HEAD~1)
          else
            all_true
            exit 0
          fi
          if git diff --name-only "$BASE_SHA" "$SHA" -- .github/workflows/publish-backend-ghcr.yml | grep -q .; then
            all_true
            exit 0
          fi
          changed() { git diff --name-only "$BASE_SHA" "$SHA" -- "$1" | grep -q .; }
          changed backend/services/projects/ && echo "projects=true" >> "$GITHUB_OUTPUT" || echo "projects=false" >> "$GITHUB_OUTPUT"
          changed backend/services/dashboard/ && echo "dashboard=true" >> "$GITHUB_OUTPUT" || echo "dashboard=false" >> "$GITHUB_OUTPUT"
          changed backend/services/budget/ && echo "budget=true" >> "$GITHUB_OUTPUT" || echo "budget=false" >> "$GITHUB_OUTPUT"
          changed backend/services/ai-document-gen/ && echo "ai_document_gen=true" >> "$GITHUB_OUTPUT" || echo "ai_document_gen=false" >> "$GITHUB_OUTPUT"
          # Web: не только web/, иначе правки только Helm/проб → образ не пушится, на ноде старый latest → 404 на health.
          if changed web/ || changed web/Dockerfile || changed infrastructure/helm/exponat/values-staging.yaml || changed infrastructure/helm/exponat/templates/deployment.yaml || changed infrastructure/k8s/patches/web-deployment-probes-http.json || changed .github/workflows/deploy-staging.yml || changed .github/workflows/publish-backend-ghcr.yml; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -q '=true$' "$GITHUB_OUTPUT"; then
            echo "any_service=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_service=false" >> "$GITHUB_OUTPUT"
          fi

  publish-images:
    name: Publish images to GHCR (backend + web)
    needs: [staging-changes]
    if: >-
      ${{
        (github.event_name != 'workflow_dispatch' || !inputs.skip_publish_images) &&
        needs.staging-changes.outputs.any_service == 'true'
      }}
    uses: ./.github/workflows/publish-backend-ghcr.yml
    with:
      build_projects: ${{ needs.staging-changes.outputs.projects == 'true' }}
      build_dashboard: ${{ needs.staging-changes.outputs.dashboard == 'true' }}
      build_budget: ${{ needs.staging-changes.outputs.budget == 'true' }}
      build_ai_document_gen: ${{ needs.staging-changes.outputs.ai_document_gen == 'true' }}
      # web всегда вместе с любым publish: иначе built_web/outputs с reusable ломаются → deploy ставит latest → старый кэш на ноде и 404 на пробах.
      build_web: ${{ needs.staging-changes.outputs.any_service == 'true' }}
    secrets: inherit

  deploy-staging:
    name: Deploy to GKE (Kong + Helm)
    runs-on: ubuntu-latest
    environment: staging
    needs: [publish-images]
    if: ${{ !cancelled() && (needs.publish-images.result == 'success' || needs.publish-images.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Check GKE service account credentials
        if: ${{ vars.KUBERNETES_AUTH != 'kubeconfig' }}
        env:
          SA: ${{ secrets.GCP_SA_KEY }}
          PROJ: ${{ vars.GCP_PROJECT_ID }}
          CLUSTER: ${{ vars.GKE_CLUSTER_NAME }}
          LOC: ${{ vars.GKE_LOCATION }}
        run: |
          if [ -z "$SA" ]; then
            echo "::error::Задайте секрет GCP_SA_KEY (JSON ключа сервисного аккаунта GCP) и variables: GCP_PROJECT_ID, GKE_CLUSTER_NAME, GKE_LOCATION. Либо выставьте KUBERNETES_AUTH=kubeconfig и Linux-kubeconfig в KUBE_CONFIG_STAGING."
            exit 1
          fi
          if [ -z "$PROJ" ] || [ -z "$CLUSTER" ] || [ -z "$LOC" ]; then
            echo "::error::Заполните variables GCP_PROJECT_ID, GKE_CLUSTER_NAME, GKE_LOCATION (зона или регион кластера)."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ vars.KUBERNETES_AUTH != 'kubeconfig' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # use_auth_provider: true включает старый встроенный «gcp» plugin kubectl — он удалён;
      # оставляем default false: в kubeconfig кладётся short-lived token (достаточно для helm --wait).
      - name: Get GKE credentials
        if: ${{ vars.KUBERNETES_AUTH != 'kubeconfig' }}
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_LOCATION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          use_dns_based_endpoint: ${{ vars.GKE_USE_DNS_BASED_ENDPOINT == 'true' }}

      - name: Check KUBE_CONFIG_STAGING
        if: ${{ vars.KUBERNETES_AUTH == 'kubeconfig' }}
        env:
          KCFG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "$KCFG" ]; then
            echo "::error::KUBE_CONFIG_STAGING пустой. Нужен kubeconfig с Linux (без gke-gcloud-auth-plugin.exe)."
            exit 1
          fi

      - name: Set K8s context (kubeconfig)
        if: ${{ vars.KUBERNETES_AUTH == 'kubeconfig' }}
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      # Образы в GHCR пушатся в этом же репо через GITHUB_TOKEN (publish-backend-ghcr.yml) — у него уже есть доступ к пакетам.
      # PAT в кластере нужен для pull между деплоями; если PAT даёт DENIED на OAuth (fine-grained/SSO/права), используем GITHUB_TOKEN
      # только для этого прогона (после завершения job токен недействителен — см. notice ниже).
      - name: Create GHCR pull secret (staging)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        env:
          GHCR_READ_PACKAGES_TOKEN: ${{ secrets.GHCR_READ_PACKAGES_TOKEN }}
          GHCR_DOCKER_USERNAME: ${{ secrets.GHCR_DOCKER_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
        run: |
          set -e
          ghcr_oauth_code() {
            local u="$1" p="$2"
            curl -sS -o /tmp/ghcr-oauth.json -w "%{http_code}" -u "${u}:${p}" \
              -G --data-urlencode "service=ghcr.io" \
              --data-urlencode "scope=repository:${REPO_OWNER}/web:pull" \
              "https://ghcr.io/token"
          }
          DOCKER_USER="${GHCR_DOCKER_USERNAME:-}"
          if [ -z "$DOCKER_USER" ]; then
            DOCKER_USER="$ACTOR"
          fi
          if [ -z "$DOCKER_USER" ]; then
            DOCKER_USER="$REPO_OWNER"
          fi
          FINAL_USER=""
          FINAL_PASS=""
          if [ -n "${GHCR_READ_PACKAGES_TOKEN:-}" ]; then
            echo "::notice::Проверка PAT (GHCR_DOCKER_USERNAME → ${DOCKER_USER})"
            CODE=$(ghcr_oauth_code "$DOCKER_USER" "$GHCR_READ_PACKAGES_TOKEN")
            if [ "$CODE" = "200" ] && jq -e '.token' /tmp/ghcr-oauth.json >/dev/null 2>&1; then
              FINAL_USER="$DOCKER_USER"
              FINAL_PASS="$GHCR_READ_PACKAGES_TOKEN"
              echo "::notice::GHCR: в кластер записан PAT (pull между деплоями без привязки к job)."
            else
              echo "::warning::PAT не прошёл OAuth для ghcr.io/${REPO_OWNER}/web (HTTP ${CODE}). Типично: fine-grained без доступа к Packages, другой владелец PAT, SSO. Переходим на GITHUB_TOKEN этого workflow — тот же доступ, что у docker push в CI."
              head -c 400 /tmp/ghcr-oauth.json 2>/dev/null || true
            fi
          else
            echo "::notice::GHCR_READ_PACKAGES_TOKEN не задан — используем GITHUB_TOKEN."
          fi
          if [ -z "$FINAL_PASS" ]; then
            CODE=$(ghcr_oauth_code "$ACTOR" "$GITHUB_TOKEN")
            if [ "$CODE" != "200" ] || ! jq -e '.token' /tmp/ghcr-oauth.json >/dev/null 2>&1; then
              echo "::error::GITHUB_TOKEN не дал OAuth 200 для ghcr.io/${REPO_OWNER}/web (HTTP ${CODE}). Нужны permissions packages: read (или write) у workflow и успешный push пакета из этого репозитория."
              head -c 400 /tmp/ghcr-oauth.json 2>/dev/null || true
              exit 1
            fi
            FINAL_USER="$ACTOR"
            FINAL_PASS="$GITHUB_TOKEN"
            echo "::notice::GHCR: в кластере GITHUB_TOKEN (действителен до конца этого job). Для стабильного pull после завершения workflow настройте PAT с read:packages или публичный пакет для staging."
          fi
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-credentials -n staging \
            --docker-server=ghcr.io \
            --docker-username="$FINAL_USER" \
            --docker-password="$FINAL_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "::notice::Secret ghcr-credentials: user=${FINAL_USER}"

      - name: Add Kong Helm repo
        run: |
          helm repo add kong https://charts.konghq.com
          helm repo update

      # Kong в ns kong; без FQDN хосты вида projects:8081 резолвятся в kong → 502 / падения проб.
      - name: Render Kong config for GKE (staging FQDN)
        run: |
          python3 infrastructure/kong/render-kong-gke-staging.py \
            infrastructure/kong/kong.yml -o /tmp/kong-gke-staging.yml
          docker run --rm -v /tmp/kong-gke-staging.yml:/kong.yml:ro kong/deck:latest file validate /kong.yml

      # kubectl apply завершается сразу; «зависание» обычно на helm --wait (нет вывода до Ready).
      - name: Apply Kong namespace and dbless ConfigMap
        run: |
          kubectl create namespace kong --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap kong-dbless-config \
            --from-file=kong.yml=/tmp/kong-gke-staging.yml \
            -n kong --dry-run=client -o yaml | kubectl apply -f -

      # После отмены job / таймаута release остаётся в pending-* — следующий upgrade падает.
      - name: Unstick Helm release kong (if pending)
        run: |
          set -e
          if ! helm status kong -n kong &>/dev/null; then
            echo "Релиза kong ещё нет — OK"
            exit 0
          fi
          STATUS=$(helm status kong -n kong -o json | jq -r '.info.status')
          echo "Helm kong текущий статус: $STATUS"
          if [[ "$STATUS" == pending-* ]]; then
            echo "::warning::Снимаем залипший статус ($STATUS) через rollback (без --wait — иначе зависание при CrashLoop)"
            helm rollback kong -n kong --timeout 3m
          fi

      - name: Helm upgrade Kong (chart)
        run: |
          echo "Helm: применение манифестов Kong (без --wait — дальше отдельный rollout)."
          helm upgrade --install kong kong/kong \
            -f ./infrastructure/kong/kong-values-common.yaml \
            -f ./infrastructure/kong/kong-values-staging.yaml \
            -n kong \
            --timeout 5m

      - name: Wait for Kong Deployment rollout
        run: |
          echo "Ожидание готовности подов Kong (до 20 мин; идут сообщения от kubectl)..."
          kubectl get deploy -n kong -o wide || true
          kubectl get pods -n kong -o wide || true
          if ! kubectl rollout status deployment/kong-kong -n kong --timeout=1200s; then
            echo "::error::Kong Deployment не стал Ready за 20m — см. события и describe ниже."
            kubectl get pods -n kong -o wide
            kubectl describe pod -n kong -l app.kubernetes.io/name=kong || true
            kubectl get events -n kong --sort-by=.lastTimestamp | tail -40
            exit 1
          fi
          kubectl get pods -n kong -o wide
          kubectl get svc -n kong -o wide

      - name: Ensure exponat-backend-env (from postgres/redis secrets)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: python3 infrastructure/k8s/ensure_exponat_backend_env.py staging

      - name: Helm dependencies (exponat / Bitnami OCI)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: helm dependency update ./infrastructure/helm/exponat

      - name: Unstick Helm release exponat (if pending)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: |
          set -e
          if ! helm status exponat -n staging &>/dev/null; then
            echo "Релиза exponat ещё нет — OK"
            exit 0
          fi
          STATUS=$(helm status exponat -n staging -o json | jq -r '.info.status')
          echo "Helm exponat текущий статус: $STATUS"
          if [[ "$STATUS" == pending-* ]]; then
            echo "::warning::Снимаем залипший статус ($STATUS) через rollback (без --wait)"
            helm rollback exponat -n staging --timeout 5m
          fi

      - name: Deploy exponat (GCP staging + web Ingress)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: |
          set -e
          ns=staging
          echo "Helm ждёт готовность Postgres/Redis (Bitnami) и всех Deployment (--atomic включает --wait). На узком кластере это часто 10–20+ мин; ниже снимок подов каждые 45s."
          kubectl get pods -n "$ns" -o wide 2>/dev/null || true
          (
            while sleep 45; do
              echo "::group::staging pods $(date -u +%H:%M:%SZ)"
              kubectl get pods -n "$ns" -o wide 2>/dev/null || true
              kubectl get events -n "$ns" --sort-by=.lastTimestamp 2>/dev/null | tail -12 || true
              echo "::endgroup::"
            done
          ) &
          W=$!
          trap 'kill "$W" 2>/dev/null || true' EXIT
          # web: после успешного publish в GHCR всегда есть :$SHA (web собирается при любом publish). Не полагаемся на outputs reusable workflow.
          WEB_TAG=latest
          if [ "${{ needs.publish-images.result }}" = "success" ]; then
            WEB_TAG="${{ github.sha }}"
          fi
          echo "::notice::Helm services.web.imageTag=${WEB_TAG} (SHA после успешного publish; latest если publish пропущен)"
          helm upgrade --install exponat ./infrastructure/helm/exponat \
            -f ./infrastructure/helm/exponat/values-staging.yaml \
            -f ./infrastructure/helm/exponat/values-staging-gcp-incluster.yaml \
            -f ./infrastructure/helm/exponat/values-staging-gcp-incluster-lowfootprint.yaml \
            --set image.repositoryPrefix=${{ github.repository_owner }} \
            --set-string "services.web.imageTag=${WEB_TAG}" \
            --namespace "$ns" \
            --create-namespace \
            --atomic \
            --timeout 25m \
            --wait
          kill "$W" 2>/dev/null || true
          trap - EXIT

      - name: Normalize web Deployment probes (remove stale tcpSocket)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: |
          if kubectl get deployment web -n staging -o name 2>/dev/null; then
            echo "Сброс проб web на единственный handler (httpGet) — после Helm"
            kubectl patch deployment web -n staging --type=json \
              --patch-file=./infrastructure/k8s/patches/web-deployment-probes-http.json || true
          fi

      # Keycloak: БД keycloak в том же Postgres (staging), Ingress auth.staging.exponat.site
      - name: Keycloak admin secret (staging)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        env:
          KC_ADMIN_PW: ${{ secrets.KEYCLOAK_STAGING_ADMIN_PASSWORD }}
        run: |
          if [ -z "$KC_ADMIN_PW" ]; then
            echo "::error::В environment «staging» задайте секрет KEYCLOAK_STAGING_ADMIN_PASSWORD (пароль пользователя admin в Keycloak)."
            exit 1
          fi
          kubectl create secret generic keycloak-admin -n staging \
            --from-literal=password="$KC_ADMIN_PW" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure Keycloak DB and keycloak-db secret
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: python3 infrastructure/k8s/ensure_keycloak_staging.py staging

      - name: Keycloak realm ConfigMap (import via keycloak-config-cli)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: |
          kubectl create configmap keycloak-realm-export -n staging \
            --from-file=realm-export.json=./infrastructure/keycloak/realm-export.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade Keycloak (Bitnami)
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.kong_only }}
        run: |
          helm upgrade --install keycloak oci://registry-1.docker.io/bitnamicharts/keycloak \
            --version 24.0.5 \
            -f ./infrastructure/keycloak/helm/values-staging-gke.yaml \
            -n staging \
            --timeout 20m \
            --wait

  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployed to Staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployed to Staging (GKE)\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
