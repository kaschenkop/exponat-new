# Деплой статического лендинга (frontend/public/landing) в Firebase Hosting.
#
# Настройка (один раз):
# 1. Firebase Console → создайте проект или привяжите существующий GCP-проект.
# 2. Включите Hosting, при необходимости привяжите домен (например exponat.site).
# 3. Замените YOUR_FIREBASE_PROJECT_ID в .firebaserc на реальный projectId.
# 4. Сервисный аккаунт для CI: IAM → создать ключ JSON для аккаунта с ролями
#    «Firebase Hosting Admin» и «Service Usage Consumer» (или роль «Editor» для теста).
# 5. В GitHub: Settings → Secrets → FIREBASE_SERVICE_ACCOUNT — вставьте целиком JSON ключа.
#
name: Deploy landing (Firebase Hosting)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "frontend/public/landing/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase-hosting.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
