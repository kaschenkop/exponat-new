# Публикует образы в GHCR: backend (Go/Python) + frontend (Next.js в ./web).
# Деплой в кластер здесь НЕ выполняется — только build + push. GKE/Kong/Helm: workflow «Deploy to Staging».
# ghcr.io/<repo_owner>/<имя> (см. deploy-staging — image.repositoryPrefix).

name: Publish images to GHCR

on:
  # Вызывается из deploy-staging при push в develop; входы задают, какие образы собирать (по диффу в вызывающем workflow).
  workflow_call:
    inputs:
      build_projects:
        type: boolean
        required: false
        default: true
      build_dashboard:
        type: boolean
        required: false
        default: true
      build_budget:
        type: boolean
        required: false
        default: true
      build_ai_document_gen:
        type: boolean
        required: false
        default: true
      build_web:
        type: boolean
        required: false
        default: true
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - 'web/**'
      - '.github/workflows/publish-backend-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-backend-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_projects: ${{ steps.flags.outputs.build_projects }}
      build_dashboard: ${{ steps.flags.outputs.build_dashboard }}
      build_budget: ${{ steps.flags.outputs.build_budget }}
      build_ai_document_gen: ${{ steps.flags.outputs.build_ai_document_gen }}
      build_web: ${{ steps.flags.outputs.build_web }}
    steps:
      - id: flags
        run: |
          if [ "${{ github.event_name }}" != "workflow_call" ]; then
            echo "build_projects=true" >> $GITHUB_OUTPUT
            echo "build_dashboard=true" >> $GITHUB_OUTPUT
            echo "build_budget=true" >> $GITHUB_OUTPUT
            echo "build_ai_document_gen=true" >> $GITHUB_OUTPUT
            echo "build_web=true" >> $GITHUB_OUTPUT
          else
            echo "build_projects=${{ inputs.build_projects }}" >> $GITHUB_OUTPUT
            echo "build_dashboard=${{ inputs.build_dashboard }}" >> $GITHUB_OUTPUT
            echo "build_budget=${{ inputs.build_budget }}" >> $GITHUB_OUTPUT
            echo "build_ai_document_gen=${{ inputs.build_ai_document_gen }}" >> $GITHUB_OUTPUT
            echo "build_web=${{ inputs.build_web }}" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: Build and push ${{ matrix.service }}
    needs: [prepare]
    if: >-
      (matrix.service == 'projects' && needs.prepare.outputs.build_projects == 'true') ||
      (matrix.service == 'dashboard' && needs.prepare.outputs.build_dashboard == 'true') ||
      (matrix.service == 'budget' && needs.prepare.outputs.build_budget == 'true') ||
      (matrix.service == 'ai-document-gen' && needs.prepare.outputs.build_ai_document_gen == 'true') ||
      (matrix.service == 'web' && needs.prepare.outputs.build_web == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: projects
            context: ./backend
            dockerfile: ./backend/services/projects/Dockerfile
          - service: dashboard
            context: ./backend
            dockerfile: ./backend/services/dashboard/Dockerfile
          - service: budget
            context: ./backend/services/budget
            dockerfile: ./backend/services/budget/Dockerfile
          - service: ai-document-gen
            context: ./backend/services/ai-document-gen
            dockerfile: ./backend/services/ai-document-gen/Dockerfile
          - service: web
            context: ./web
            dockerfile: ./web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: matrix.service != 'web'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          provenance: false
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}

      - name: Build and push web (Next.js staging URLs)
        if: matrix.service == 'web'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          provenance: false
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.staging.exponat.site
            NEXT_PUBLIC_PROJECTS_API_URL=https://api.staging.exponat.site
            NEXT_PUBLIC_DEV_ORGANIZATION_ID=11111111-1111-1111-1111-111111111111
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
