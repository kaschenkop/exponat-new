# Публикует backend-образы в GHCR: ghcr.io/<repo_owner>/<service> (owner = github.repository_owner).
# GITHUB_TOKEN не может пушить в чужой org (например exponat), только в namespace владельца репозитория.
# В CI Helm получает --set image.repositoryPrefix=<owner> (см. deploy-staging).

name: Publish backend images to GHCR

on:
  # Вызывается из deploy-staging при push в develop (образы совпадают с коммитом деплоя).
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'backend/services/**'
      - '.github/workflows/publish-backend-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-backend-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: projects
            context: ./backend
            dockerfile: ./backend/services/projects/Dockerfile
          - service: dashboard
            context: ./backend
            dockerfile: ./backend/services/dashboard/Dockerfile
          - service: budget
            context: ./backend/services/budget
            dockerfile: ./backend/services/budget/Dockerfile
          - service: ai-document-gen
            context: ./backend/services/ai-document-gen
            dockerfile: ./backend/services/ai-document-gen/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          provenance: false
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
