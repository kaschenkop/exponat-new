# Публикует backend-образы в GHCR по путям, которые ожидает Helm:
#   ghcr.io/exponat/<service>:latest (и тег по SHA коммита).
# Без этого в кластере будет ErrImagePull даже при корректном imagePullSecret.

name: Publish backend images to GHCR

on:
  push:
    branches: [develop, main]
    paths:
      - 'backend/services/**'
      - '.github/workflows/publish-backend-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-backend-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: projects
            context: ./backend
            dockerfile: ./backend/services/projects/Dockerfile
          - service: dashboard
            context: ./backend
            dockerfile: ./backend/services/dashboard/Dockerfile
          - service: budget
            context: ./backend/services/budget
            dockerfile: ./backend/services/budget/Dockerfile
          - service: ai-document-gen
            context: ./backend/services/ai-document-gen
            dockerfile: ./backend/services/ai-document-gen/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          provenance: false
          push: true
          tags: |
            ghcr.io/exponat/${{ matrix.service }}:latest
            ghcr.io/exponat/${{ matrix.service }}:${{ github.sha }}
