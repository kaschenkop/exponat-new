name: Backend Python CI

on:
  pull_request:
    paths:
      - 'backend/services/ai-document-gen/**'
      - '.github/workflows/backend-python-ci.yml'
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/services/ai-document-gen/**'

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend/services/ai-document-gen
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        working-directory: backend/services/ai-document-gen
        run: ruff check .

      - name: Type check with mypy
        working-directory: backend/services/ai-document-gen
        run: mypy app/ --ignore-missing-imports

  test:
    name: Test Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend/services/ai-document-gen
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        working-directory: backend/services/ai-document-gen
        run: pytest --cov=app --cov-report=xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        working-directory: backend/services/ai-document-gen
        run: docker build -t exponat/ai-document-gen:${{ github.sha }} .
