# Пароль Postgres задаётся только при первом создании тома.
# Если видите FATAL: password authentication failed — старый том с другим паролем:
#   docker compose down -v
# либо: docker volume ls → удалите том с exponat_pgdata в имени
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exponat_dev
    ports:
      - "5432:5432"
    volumes:
      # Имя тома с префиксом проекта: не reuse старого pgdata с чужим паролем
      - exponat_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  dashboard:
    build:
      context: ./backend
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      REDIS_ADDR: redis:6379
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  projects:
    build:
      context: ./backend
      dockerfile: services/projects/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_PROJECTS_API_URL: http://localhost:8081
        NEXT_PUBLIC_DEV_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    ports:
      - '3000:3000'
    depends_on:
      - dashboard
      - projects
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

volumes:
  exponat_pgdata:
  mongo_data:
