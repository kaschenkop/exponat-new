# Пароль Postgres задаётся только при первом создании тома.
# Если видите FATAL: password authentication failed — старый том с другим паролем:
#   docker compose down -v
# либо: docker volume ls → удалите том с exponat_pgdata в имени
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exponat_dev
    ports:
      - "5432:5432"
    volumes:
      # Имя тома с префиксом проекта: не reuse старого pgdata с чужим паролем
      - exponat_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  dashboard:
    build:
      context: ./backend
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      REDIS_ADDR: redis:6379
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  projects:
    build:
      context: ./backend
      dockerfile: services/projects/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Budget API (Kong: /api/v1/budgets → budget:8082)
  budget:
    build:
      context: ./backend/services/budget
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Единая точка входа API (см. infrastructure/kong/kong.yml)
  kong:
    image: kong:3.5
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      redis:
        condition: service_started
      dashboard:
        condition: service_started
      projects:
        condition: service_started
      budget:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Через Kong (порт 8000); dashboard/projects всё ещё на 8080/8081 для прямых вызовов
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_PROJECTS_API_URL: http://localhost:8000
        NEXT_PUBLIC_DEV_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    ports:
      - '3000:3000'
    depends_on:
      - dashboard
      - projects
      - kong
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

volumes:
  exponat_pgdata:
  mongo_data:
