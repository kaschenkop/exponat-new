# Пароль Postgres задаётся только при первом создании тома.
# Если видите FATAL: password authentication failed — старый том с другим паролем:
#   docker compose down -v
# либо: docker volume ls → удалите том с exponat_pgdata в имени
#
# Keycloak (IAM) на том же Postgres, что и приложение (БД `keycloak` — только migrations/initdb/ при первом init).
# Схема приложения: после первого старта postgres выполните `docker compose --profile migrate run --rm db-migrate`.
# Старый том без keycloak: `docker compose down -v` или вручную CREATE DATABASE keycloak (см. migrations/initdb/000_keycloak_database.sql).
# UI: http://localhost:8090 после `docker compose up -d`.
# Отдельный только Keycloak: infrastructure/keycloak/docker-compose.keycloak.yml
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exponat_dev
    ports:
      - "5432:5432"
    volumes:
      # Имя тома с префиксом проекта: не reuse старого pgdata с чужим паролем
      - exponat_pgdata:/var/lib/postgresql/data
      - ./migrations/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  dashboard:
    build:
      context: ./backend
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      REDIS_ADDR: redis:6379
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  projects:
    build:
      context: ./backend
      dockerfile: services/projects/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Budget API (Kong: /api/v1/budgets → budget:8082)
  budget:
    build:
      context: ./backend/services/budget
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      PORT: "8082"
      SKIP_AUTH: "true"
      DEFAULT_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8082/health']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Единая точка входа API (см. infrastructure/kong/kong.yml)
  kong:
    image: kong:3.5
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      redis:
        condition: service_healthy
      dashboard:
        condition: service_started
      projects:
        condition: service_started
      budget:
        condition: service_healthy
    restart: unless-stopped

  # Веб: в образ копируется результат `npm run build` (см. web/Dockerfile). Том с ./web НЕ монтируется —
  # правки на диске не видны в контейнере, пока не пересоберёте образ:
  #   docker compose build web --no-cache && docker compose up -d web
  # или: docker compose up -d --build web
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Через Kong (порт 8000); dashboard/projects всё ещё на 8080/8081 для прямых вызовов
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_PROJECTS_API_URL: http://localhost:8000
        NEXT_PUBLIC_DEV_ORGANIZATION_ID: 11111111-1111-1111-1111-111111111111
    environment:
      # NextAuth: без NEXTAUTH_SECRET был бы 500 на /api/auth/session
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-nextauth-secret-min-32-characters-long!!}
      # Keycloak на хосте (отдельный compose :8090). Из контейнера web — host.docker.internal (на Linux см. extra_hosts)
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://host.docker.internal:8090/realms/exponat-development}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-exponat-web}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '3000:3000'
    depends_on:
      - dashboard
      - projects
      - kong
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  # Keycloak: одна инстанция Postgres (см. postgres + migrations/initdb)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command:
      - start-dev
      - --import-realm
      - --http-relative-path=/
      # Иначе тема из volume часто не видна без рестарта / сброса кэша
      - "--spi-theme--static-max-age=-1"
      - "--spi-theme--cache-themes=false"
      - "--spi-theme--cache-templates=false"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password_change_me
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: '8080'
      KC_LOG_LEVEL: INFO
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
    ports:
      - '8090:8080'
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./infrastructure/keycloak/themes/exponat:/opt/keycloak/themes/exponat:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Схема exponat_dev (golang-migrate): docker compose --profile migrate run --rm db-migrate
  db-migrate:
    image: migrate/migrate:v4.18.1
    profiles:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/app:/migrations:ro
    command:
      - -path=/migrations
      - -database
      - postgres://postgres:postgres@postgres:5432/exponat_dev?sslmode=disable
      - up
    restart: "no"

volumes:
  exponat_pgdata:
  mongo_data:
